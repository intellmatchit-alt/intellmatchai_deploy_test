      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    SuperadminAuthResponse:
      type: object
      properties:
        token:
          type: string
        admin:
          $ref: '#/components/schemas/SuperadminUser'

    SuperadminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, ADMIN, MODERATOR, SUPPORT]
        isActive:
          type: boolean

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        adminId:
          type: string
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        details:
          type: object
        createdAt:
          type: string
          format: date-time

    # ============ JOB MATCHING ============
    HiringProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        roleArea:
          type: string
        seniority:
          type: string
        location:
          type: string
        workMode:
          type: string
          enum: [REMOTE, HYBRID, ONSITE]
        employmentType:
          type: string
          enum: [FULL_TIME, PART_TIME, CONTRACT, FREELANCE]
        mustHaveSkills:
          type: array
          items:
            type: string
        niceToHaveSkills:
          type: array
          items:
            type: string
        salaryMin:
          type: number
        salaryMax:
          type: number
        salaryCurrency:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateHiringProfileRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        roleArea:
          type: string
        seniority:
          type: string
        location:
          type: string
        workMode:
          type: string
          enum: [REMOTE, HYBRID, ONSITE]
        employmentType:
          type: string
          enum: [FULL_TIME, PART_TIME, CONTRACT, FREELANCE]
        mustHaveSkills:
          type: array
          items:
            type: string
        niceToHaveSkills:
          type: array
          items:
            type: string
        salaryMin:
          type: number
        salaryMax:
          type: number
        salaryCurrency:
          type: string
        description:
          type: string

    CandidateProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        roleArea:
          type: string
        seniority:
          type: string
        skills:
          type: array
          items:
            type: string
        availability:
          type: string
        preferredWorkMode:
          type: string
          enum: [REMOTE, HYBRID, ONSITE]
        expectedSalaryMin:
          type: number
        expectedSalaryMax:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateCandidateProfileRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        roleArea:
          type: string
        seniority:
          type: string
        skills:
          type: array
          items:
            type: string
        availability:
          type: string
        preferredWorkMode:
          type: string
          enum: [REMOTE, HYBRID, ONSITE]
        expectedSalaryMin:
          type: number
        expectedSalaryMax:
          type: number

    JobMatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hiringProfileId:
          type: string
          format: uuid
        candidateProfileId:
          type: string
          format: uuid
        deterministicScore:
          type: number
        aiScore:
          type: number
        finalScore:
          type: number
        confidence:
          type: number
        matchLevel:
          type: string
          enum: [EXCELLENT, STRONG, MODERATE, WEAK]
        scoreBreakdown:
          type: object
        keyReasons:
          type: array
          items:
            type: string
        rank:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ============ OPPORTUNITY MATCHING V2 ============
    OpportunityMatchV2:
      type: object
      properties:
        id:
          type: string
          format: uuid
        intentId:
          type: string
          format: uuid
        matchedUserId:
          type: string
          format: uuid
        matchType:
          type: string
        status:
          type: string
          enum: [PENDING, REVIEWED, ACCEPTED, REJECTED]
        score:
          type: number
        explanation:
          type: string
        hardFilters:
          type: object
        createdAt:
          type: string
          format: date-time

    AsyncJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [QUEUED, PROCESSING, COMPLETED, FAILED, CANCELLED]
        progress:
          type: number
        result:
          type: object

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  environment:
                    type: string

  /health/services:
    get:
      tags: [Health]
      summary: AI services health status
      operationId: servicesHealth
      security: []
      responses:
        '200':
          description: All services healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: boolean
                  services:
                    type: object
                  activeProviders:
                    type: object
                  timestamp:
                    type: string

  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout from all devices
      operationId: logoutAll
      security:
        - BearerAuth: []
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent (always returns success to prevent enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify email address
      operationId: verifyEmail
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirects to frontend with success/error

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      operationId: resendVerification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/linkedin:
    post:
      tags: [Auth]
      summary: Exchange LinkedIn OAuth code for profile data
      operationId: linkedinAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkedInTokenRequest'
      responses:
        '200':
          description: LinkedIn profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      linkedinId:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                      firstName:
                        type: string
                      lastName:
                        type: string
                      picture:
                        type: string
                      emailVerified:
                        type: boolean

  /auth/linkedin/register:
    post:
      tags: [Auth]
      summary: Register or login with LinkedIn profile
      operationId: linkedinRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkedInRegisterRequest'
      responses:
        '200':
          description: Login/register successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'

  # ==================== PROFILE ====================
  /profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
    put:
      tags: [Profile]
      summary: Update user profile
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
    delete:
      tags: [Profile]
      summary: Deactivate user account
      operationId: deactivateAccount
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/sectors:
    put:
      tags: [Profile]
      summary: Update user sectors
      operationId: updateProfileSectors
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSectorsRequest'
      responses:
        '200':
          description: Sectors updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/skills:
    put:
      tags: [Profile]
      summary: Update user skills
      operationId: updateProfileSkills
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSkillsRequest'
      responses:
        '200':
          description: Skills updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/interests:
    put:
      tags: [Profile]
      summary: Update user interests
      operationId: updateProfileInterests
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInterestsRequest'
      responses:
        '200':
          description: Interests updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/hobbies:
    put:
      tags: [Profile]
      summary: Update user hobbies
      operationId: updateProfileHobbies
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHobbiesRequest'
      responses:
        '200':
          description: Hobbies updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/goals:
    put:
      tags: [Profile]
      summary: Update networking goals
      operationId: updateProfileGoals
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalsRequest'
      responses:
        '200':
          description: Goals updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/consent:
    put:
      tags: [Profile]
      summary: Update consent settings
      operationId: updateConsent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConsentRequest'
      responses:
        '200':
          description: Consent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/avatar:
    post:
      tags: [Profile]
      summary: Upload avatar image
      operationId: uploadAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
                  description: Image file (JPEG, PNG, GIF, WebP). Max 5MB.
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      avatarUrl:
                        type: string

  /profile/parse-cv:
    post:
      tags: [Profile]
      summary: Upload and parse CV
      operationId: parseCv
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [cv]
              properties:
                cv:
                  type: string
                  format: binary
                  description: CV file (PDF, DOC, DOCX). Max 5MB.
      responses:
        '200':
          description: CV parsed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /profile/enrich:
    post:
      tags: [Profile]
      summary: Enrich profile via LinkedIn/CV/AI
      operationId: enrichProfile
      security:
        - BearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                cv:
                  type: string
                  format: binary
                  description: Optional CV file
                linkedInUrl:
                  type: string
                twitterUrl:
                  type: string
                bio:
                  type: string
                locale:
                  type: string
                  default: en
                enhanceWithWebSearch:
                  type: boolean
      responses:
        '200':
          description: Profile enriched
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      profile:
                        type: object
                      generatedBio:
                        type: string
                      generatedBioSummary:
                        type: string
                      generatedBioFull:
                        type: string
                      bioDirection:
                        type: string
                        enum: [ltr, rtl]
                      suggestedSectors:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            confidence:
                              type: number
                      suggestedSkills:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            confidence:
                              type: number
                      suggestedInterests:
                        type: array
                        items:
                          type: object
                      suggestedHobbies:
                        type: array
                        items:
                          type: object

  /profile/onboarding:
    post:
      tags: [Profile]
      summary: Complete full onboarding
      operationId: completeOnboarding
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingRequest'
      responses:
        '200':
          description: Onboarding complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /profile/onboarding-progress:
    get:
      tags: [Profile]
      summary: Get onboarding progress
      operationId: getOnboardingProgress
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Onboarding progress data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
    post:
      tags: [Profile]
      summary: Save partial onboarding progress
      operationId: saveOnboardingProgress
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingProgressRequest'
      responses:
        '200':
          description: Progress saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==================== CONTACTS ====================
  /contacts:
    get:
      tags: [Contacts]
      summary: List contacts with pagination and filters
      operationId: listContacts
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: sector
          in: query
          schema:
            type: string
            format: uuid
        - name: favorite
          in: query
          schema:
            type: boolean
        - name: minScore
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, createdAt, matchScore, lastContactedAt]
            default: createdAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated contacts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Contacts]
      summary: Create a new contact
      operationId: createContact
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactRequest'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Contact'

  /contacts/recent:
    get:
      tags: [Contacts]
      summary: Get recently added contacts
      operationId: getRecentContacts
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: Recent contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'

  /contacts/follow-up:
    get:
      tags: [Contacts]
      summary: Get contacts needing follow-up
      operationId: getFollowUpContacts
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Follow-up contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'

  /contacts/analyze:
    post:
      tags: [Contacts]
      summary: AI analyze contact data
      operationId: analyzeContact
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                company:
                  type: string
                jobTitle:
                  type: string
                email:
                  type: string
                website:
                  type: string
      responses:
        '200':
          description: AI analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /contacts/enrich-linkedin:
    post:
      tags: [Contacts]
      summary: Enrich contact via LinkedIn URL
      operationId: enrichContactLinkedIn
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, linkedInUrl]
              properties:
                fullName:
                  type: string
                linkedInUrl:
                  type: string
      responses:
        '200':
          description: Enriched profile data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
