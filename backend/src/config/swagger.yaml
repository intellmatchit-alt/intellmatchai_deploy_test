openapi: 3.0.3
info:
  title: IntellMatch API
  description: |
    IntellMatch (P2P Network) - Professional Networking Platform API.

    AI-powered relationship management with business card scanning, intelligent matching,
    collaboration projects, pitch deck analysis, deal matching, event networking, and messaging.

    ## Authentication
    Most endpoints require a JWT Bearer token. Obtain tokens via `/auth/login` or `/auth/register`.

    ## Rate Limiting
    API requests are rate-limited. Auth endpoints have stricter limits.

    ## File Uploads
    File upload endpoints use `multipart/form-data`. Max sizes vary by endpoint.
  version: 1.0.0
  contact:
    name: IntellMatch Team
    url: https://intellmatch.com

servers:
  - url: https://intellmatch.com/api/v1
    description: Production
  - url: /api/v1
    description: Local / Relative

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication and authorization
  - name: Profile
    description: User profile management
  - name: Contacts
    description: Contact CRUD operations
  - name: Contact Tasks
    description: Tasks associated with contacts
  - name: Contact Reminders
    description: Reminders for contacts
  - name: Contact Notes
    description: Rich media notes on contacts
  - name: Contact Import
    description: Batch contact import
  - name: Scan
    description: Business card scanning and OCR
  - name: Matches
    description: AI-powered contact matching
  - name: Itemized Matches
    description: Detailed per-criterion match breakdown
  - name: Graph
    description: Network graph and relationship visualization
  - name: Dashboard
    description: Dashboard analytics and statistics
  - name: Projects
    description: Collaboration project management
  - name: Opportunities
    description: Job/hiring opportunity matching
  - name: Pitches
    description: Pitch deck analysis and investor matching
  - name: Pitch Matches
    description: Pitch match status management
  - name: Deals
    description: Buy/sell deal matching
  - name: Deal Results
    description: Deal match result management
  - name: Product Profile
    description: Product profile and matching
  - name: Collaboration Requests
    description: Collaboration request workflow
  - name: Collaboration Sessions
    description: Collaboration matching sessions
  - name: Collaboration Settings
    description: User collaboration preferences
  - name: Collaboration Ledger
    description: Collaboration history tracking
  - name: Collaboration Invitations
    description: Collaboration invitation management
  - name: Introductions
    description: Contact introduction workflow
  - name: Team Members
    description: Team member management across features
  - name: Events
    description: Networking event management
  - name: Messages
    description: Real-time messaging
  - name: Calendar
    description: Calendar events and meetings
  - name: Find Contact
    description: Contact search and discovery
  - name: Invitations
    description: Platform invitations
  - name: Users
    description: User search and lookup
  - name: Payments
    description: Subscription and payment management
  - name: Storage
    description: File storage and retrieval
  - name: Lookups
    description: Reference data (sectors, skills, interests, hobbies)
  - name: Contact Inquiry
    description: Public team inquiry form
  - name: SDAIA
    description: Saudi PDPL compliance endpoints
  - name: Tasks
    description: Standalone task management with categories, recurrence, sharing, and attachments
  - name: Notifications
    description: User notification management and push subscriptions
  - name: Wallet
    description: Point wallet and transactions
  - name: Organizations
    description: Team organization management
  - name: Videos
    description: Public video gallery
  - name: Bug Reports
    description: QA bug report submission
  - name: Affiliate
    description: Affiliate program management
  - name: Suggestions
    description: Profile improvement and skill gap analysis
  - name: App Config
    description: Public application configuration and pricing
  - name: Admin
    description: Admin panel (requires admin role)
  - name: Superadmin
    description: Superadmin panel (separate auth system)
  - name: Opportunity Matching V2
    description: V2 opportunity matching with hard filters and AI validation
  - name: Job Matching
    description: V3 hiring and candidate matching engine

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /auth/login or /auth/register
    SuperadminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Superadmin JWT from /superadmin/auth/login (separate auth system)

  schemas:
    # ============ COMMON ============
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # ============ AUTH ============
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
        name:
          type: string
          minLength: 2
          maxLength: 100
        title:
          type: string
          maxLength: 20
        firstName:
          type: string
          maxLength: 100
        middleName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        preferredLocale:
          type: string
          enum: [en, ar]
          default: en

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          maxLength: 128

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 128

    LinkedInTokenRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
        redirectUri:
          type: string

    LinkedInRegisterRequest:
      type: object
      required: [linkedinId, email, name]
      properties:
        linkedinId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        picture:
          type: string

    # ============ USER / PROFILE ============
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        fullName:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        avatarUrl:
          type: string
        emailVerified:
          type: boolean

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        fullName:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        linkedinUrl:
          type: string
        websiteUrl:
          type: string
        phone:
          type: string
        location:
          type: string
        timezone:
          type: string
        emailVerified:
          type: boolean
        consent:
          type: object
          properties:
            enrichment:
              type: boolean
            contacts:
              type: boolean
            analytics:
              type: boolean
        sectors:
          type: array
          items:
            $ref: '#/components/schemas/UserSectorItem'
        skills:
          type: array
          items:
            $ref: '#/components/schemas/UserSkillItem'
        interests:
          type: array
          items:
            $ref: '#/components/schemas/UserInterestItem'
        hobbies:
          type: array
          items:
            $ref: '#/components/schemas/HobbyItem'
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalItem'

    UpdateProfileRequest:
      type: object
      properties:
        fullName:
          type: string
        jobTitle:
          type: string
        company:
          type: string
        bio:
          type: string
        linkedinUrl:
          type: string
        websiteUrl:
          type: string
        phone:
          type: string
        location:
          type: string
        timezone:
          type: string

    UpdateSectorsRequest:
      type: object
      required: [sectors]
      properties:
        sectors:
          type: array
          items:
            type: object
            required: [sectorId]
            properties:
              sectorId:
                type: string
                format: uuid
              isPrimary:
                type: boolean
              experienceYears:
                type: number

    UpdateSkillsRequest:
      type: object
      required: [skills]
      properties:
        skills:
          type: array
          items:
            type: object
            required: [skillId]
            properties:
              skillId:
                type: string
                format: uuid
              proficiencyLevel:
                type: string
                enum: [BEGINNER, INTERMEDIATE, ADVANCED, EXPERT]

    UpdateInterestsRequest:
      type: object
      required: [interests]
      properties:
        interests:
          type: array
          items:
            type: object
            required: [interestId]
            properties:
              interestId:
                type: string
                format: uuid
              intensity:
                type: string
                enum: [CASUAL, MODERATE, PASSIONATE]

    UpdateHobbiesRequest:
      type: object
      required: [hobbies]
      properties:
        hobbies:
          type: array
          items:
            type: object
            required: [hobbyId]
            properties:
              hobbyId:
                type: string
                format: uuid

    UpdateGoalsRequest:
      type: object
      required: [goals]
      properties:
        goals:
          type: array
          items:
            type: object
            required: [type]
            properties:
              type:
                type: string
                enum: [MENTORSHIP, INVESTMENT, PARTNERSHIP, HIRING, JOB_SEEKING, COLLABORATION, LEARNING, SALES, OTHER]
              description:
                type: string
              priority:
                type: integer

    UpdateConsentRequest:
      type: object
      properties:
        enrichment:
          type: boolean
        contacts:
          type: boolean
        analytics:
          type: boolean

    EnrichProfileRequest:
      type: object
      properties:
        linkedInUrl:
          type: string
        twitterUrl:
          type: string
        bio:
          type: string
        locale:
          type: string
          default: en
        enhanceWithWebSearch:
          type: boolean

    OnboardingRequest:
      type: object
      properties:
        profile:
          type: object
          properties:
            fullName:
              type: string
            jobTitle:
              type: string
            company:
              type: string
            phone:
              type: string
            location:
              type: string
        sectors:
          type: array
          items:
            type: string
        customSectors:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        customSkills:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        customInterests:
          type: array
          items:
            type: string
        goals:
          type: array
          items:
            type: string
            enum: [MENTORSHIP, INVESTMENT, PARTNERSHIP, HIRING, JOB_SEEKING, COLLABORATION, LEARNING, SALES, OTHER]
        customGoals:
          type: array
          items:
            type: string
        bio:
          type: string

    OnboardingProgressRequest:
      type: object
      properties:
        currentStep:
          type: integer
          minimum: 0
          maximum: 5
        socialData:
          type: object
        profile:
          type: object
        bio:
          type: string
        enrichmentData:
          type: object
        selectedSectors:
          type: array
          items:
            type: string

    UserSectorItem:
      type: object
      properties:
        sectorId:
          type: string
        name:
          type: string
        isPrimary:
          type: boolean
        experienceYears:
          type: number

    UserSkillItem:
      type: object
      properties:
        skillId:
          type: string
        name:
          type: string
        proficiencyLevel:
          type: string
          enum: [BEGINNER, INTERMEDIATE, ADVANCED, EXPERT]

    UserInterestItem:
      type: object
      properties:
        interestId:
          type: string
        name:
          type: string
        intensity:
          type: string
          enum: [CASUAL, MODERATE, PASSIONATE]

    HobbyItem:
      type: object
      properties:
        hobbyId:
          type: string
        name:
          type: string

    GoalItem:
      type: object
      properties:
        type:
          type: string
          enum: [MENTORSHIP, INVESTMENT, PARTNERSHIP, HIRING, JOB_SEEKING, COLLABORATION, LEARNING, SALES, OTHER]
        description:
          type: string
        priority:
          type: integer

    # ============ CONTACTS ============
    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        jobTitle:
          type: string
        bio:
          type: string
        bioSummary:
          type: string
        avatarUrl:
          type: string
        linkedInUrl:
          type: string
        websiteUrl:
          type: string
        location:
          type: string
        source:
          type: string
          enum: [CARD_SCAN, MANUAL, IMPORT, LINKEDIN, COLLABORATION, EVENT, PHOTO]
        matchScore:
          type: number
        sectors:
          type: array
          items:
            type: object
            properties:
              sectorId:
                type: string
              name:
                type: string
        skills:
          type: array
          items:
            type: object
            properties:
              skillId:
                type: string
              name:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateContactRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        title:
          type: string
          maxLength: 20
        firstName:
          type: string
          maxLength: 100
        middleName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        phone:
          type: string
          maxLength: 50
        company:
          type: string
          maxLength: 100
        jobTitle:
          type: string
          maxLength: 100
        bio:
          type: string
          maxLength: 3000
        bioSummary:
          type: string
          maxLength: 500
        bioFull:
          type: string
          maxLength: 5000
        linkedInUrl:
          type: string
          format: uri
        websiteUrl:
          type: string
          format: uri
        location:
          type: string
          maxLength: 255
        sectors:
          type: array
          items:
            type: object
            properties:
              sectorId:
                type: string
              isPrimary:
                type: boolean
        skills:
          type: array
          items:
            type: object
            properties:
              skillId:
                type: string
              proficiency:
                type: string
        interests:
          type: array
          items:
            type: object
            properties:
              interestId:
                type: string
        hobbies:
          type: array
          items:
            type: object
            properties:
              hobbyId:
                type: string
        customSectors:
          type: array
          items:
            type: string
        customSkills:
          type: array
          items:
            type: string
        customInterests:
          type: array
          items:
            type: string
        customHobbies:
          type: array
          items:
            type: string
        notes:
          type: string
          maxLength: 5000
        source:
          type: string
          enum: [MANUAL, CARD_SCAN, IMPORT, LINKEDIN]
          default: MANUAL
        cardImageUrl:
          type: string
          format: uri

    ContactInteractionRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [MEETING, CALL, EMAIL, MESSAGE, EVENT, OTHER]
        notes:
          type: string
          maxLength: 1000
        date:
          type: string
          format: date-time

    # ============ CONTACT TASKS ============
    ContactTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        voiceNoteUrl:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        dueDate:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, URGENT]
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, CANCELLED]
        createdAt:
          type: string
          format: date-time

    CreateContactTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        voiceNoteUrl:
          type: string
        dueDate:
          type: string
          format: date-time
        reminderAt:
          type: string
          format: date-time
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, URGENT]

    # ============ CONTACT REMINDERS ============
    ContactReminder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        reminderAt:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        imageUrls:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    CreateReminderRequest:
      type: object
      required: [title, reminderAt]
      properties:
        title:
          type: string
        description:
          type: string
        reminderAt:
          type: string
          format: date-time

    # ============ CONTACT NOTES ============
    ContactNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [TEXT, IMAGE, VOICE, FILE]
        content:
          type: string
        fileUrl:
          type: string
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        duration:
          type: number
        createdAt:
          type: string
          format: date-time

    # ============ SCAN ============
    ScanCardRequest:
      type: object
      required: [imageData, mimeType]
      properties:
        imageData:
          type: string
          description: Base64 encoded image
        mimeType:
          type: string

    ScanConfirmRequest:
      type: object
      required: [name, cardImageUrl]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        jobTitle:
          type: string
        website:
          type: string
        cardImageUrl:
          type: string
        sectors:
          type: array
          items:
            type: string

    SuggestSectorsRequest:
      type: object
      properties:
        company:
          type: string
        jobTitle:
          type: string

    # ============ MATCHES ============
    MatchResult:
      type: object
      properties:
        contactId:
          type: string
          format: uuid
        contact:
          $ref: '#/components/schemas/Contact'
        overallScore:
          type: number
          minimum: 0
          maximum: 100
        sectorScore:
          type: number
        skillScore:
          type: number
        interestScore:
          type: number
        explanation:
          type: string
        lastCalculated:
          type: string
          format: date-time

    MatchFeedbackRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [ACCEPT, REJECT, SAVE, CONNECT, MESSAGE, HIDE]
        rating:
          type: integer
          minimum: 1
          maximum: 5
        feedbackNote:
          type: string
        source:
          type: string

    ItemizedMatchResult:
      type: object
      properties:
        contactId:
          type: string
        overallScore:
          type: number
        overallStatus:
          type: string
        criteria:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              score:
                type: number
              weight:
                type: number
              status:
                type: string
                enum: [PERFECT, EXCELLENT, STRONG, MODERATE, WEAK, NO_MATCH]
              importance:
                type: string
                enum: [CRITICAL, HIGH, MEDIUM, LOW]
              explanation:
                type: string
              yourValue:
                type: string
              theirValue:
                type: string

    # ============ PROJECTS ============
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        detailedDesc:
          type: string
        category:
          type: string
        stage:
          type: string
          enum: [IDEA, VALIDATION, MVP, LAUNCHED, GROWTH, SCALING]
        investmentRange:
          type: string
        timeline:
          type: string
        lookingFor:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [PUBLIC, PRIVATE, CONNECTIONS_ONLY]
        sectors:
          type: array
          items:
            type: object
        skills:
          type: array
          items:
            type: object
        matches:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [title, summary]
      properties:
        title:
          type: string
          maxLength: 255
        summary:
          type: string
          maxLength: 2000
        detailedDesc:
          type: string
          maxLength: 10000
        category:
          type: string
          maxLength: 100
        stage:
          type: string
          enum: [IDEA, VALIDATION, MVP, LAUNCHED, GROWTH, SCALING]
          default: IDEA
        investmentRange:
          type: string
          maxLength: 100
        timeline:
          type: string
          maxLength: 2000
        lookingFor:
          type: array
          items:
            type: string
            enum: [cofounder, investor, technical_partner, business_partner, advisor, employee, contractor, customer, supplier]
        sectorIds:
          type: array
          items:
            type: string
            format: uuid
        skills:
          type: array
          items:
            type: object
            properties:
              skillId:
                type: string
                format: uuid
              importance:
                type: string
                enum: [REQUIRED, PREFERRED, NICE_TO_HAVE]
                default: REQUIRED
        visibility:
          type: string
          enum: [PUBLIC, PRIVATE, CONNECTIONS_ONLY]
          default: PUBLIC

    ProjectMatchStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, contacted, saved, dismissed, connected]

    # ============ OPPORTUNITIES ============
    Opportunity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        intentType:
          type: string
          enum: [HIRING, OPEN_TO_OPPORTUNITIES, ADVISORY_BOARD, REFERRALS_ONLY]
        roleArea:
          type: string
        seniority:
          type: string
          enum: [ENTRY, MID, SENIOR, LEAD, DIRECTOR, VP, C_LEVEL, BOARD]
        locationPref:
          type: string
        remoteOk:
          type: boolean
        notes:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, LIMITED, TEAM]
        createdAt:
          type: string
          format: date-time

    CreateOpportunityRequest:
      type: object
      required: [title, intentType]
      properties:
        title:
          type: string
        intentType:
          type: string
          enum: [HIRING, OPEN_TO_OPPORTUNITIES, ADVISORY_BOARD, REFERRALS_ONLY]
        roleArea:
          type: string
        seniority:
          type: string
          enum: [ENTRY, MID, SENIOR, LEAD, DIRECTOR, VP, C_LEVEL, BOARD]
        locationPref:
          type: string
        remoteOk:
          type: boolean
          default: true
        notes:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, LIMITED, TEAM]
          default: PRIVATE
        sectorIds:
          type: array
          items:
            type: string
