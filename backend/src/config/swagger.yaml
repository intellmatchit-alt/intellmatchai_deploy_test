  # ==================== FIND CONTACT ====================
  /find-contact/search:
    post:
      tags: [Find Contact]
      summary: Search for contact by email/phone/name/image
      operationId: findContactSearch
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [intent]
              properties:
                query:
                  type: string
                intent:
                  type: string
                  enum: [MEETING, COLLABORATION, FOLLOW_UP, SALES, SUPPORT, OTHER]
                intentNote:
                  type: string
                image:
                  type: string
                  format: binary
                consentFaceMatch:
                  type: boolean
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      requestId:
                        type: string
                      inputType:
                        type: string
                      status:
                        type: string
                      results:
                        type: array
                        items:
                          type: object
                      suggestedActions:
                        type: array
                        items:
                          type: string
                      openingSentences:
                        type: array
                        items:
                          type: string

